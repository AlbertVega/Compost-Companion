; -------- YARI'S ESP XD --------
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200
build_flags =
  -DUSE_FAKE_SENSOR
lib_deps =
  DFRobot/DFRobot_SHT20
  bblanchon/ArduinoJson
  h2zero/NimBLE-Arduino